        const Counter = ({ value, onChange, min = 0, max = 99, label }) => (
            <div className="flex flex-col items-center">
                {label && <span className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-1">{label}</span>}

        const App = () => {
            // State
            const [rawText, setRawText] = useState('');
            const [rawSchedule, setRawSchedule] = useState('');
            const [baseTable, setBaseTable] = useState([]); // [{name, p, w, d, l, b, f, a, gd, pts, baseRank}]
            const [currentRound, setCurrentRound] = useState(1);
            const [totalRounds, setTotalRounds] = useState(14);
            const [predictions, setPredictions] = useState([]); // [{id, round, teamA, teamB, scoreA, scoreB, isBye, time}]
            const [activeTab, setActiveTab] = useState('import'); // 'import', 'history', 'predict'
            
            // History States
            const [historyData, setHistoryData] = useState([]); // [{ round: 1, table: [...] }, ...]
            const [historyMetrics, setHistoryMetrics] = useState(null);
            const [scrubberRound, setScrubberRound] = useState(1);
            const [highlightedTeam, setHighlightedTeam] = useState(null);

            // Parse JSON File Upload
            const handleJSONUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const json = JSON.parse(event.target.result);
                        if (!json.standings || !json.team_results) {
                            alert('Invalid JSON format. Expected "standings" and "team_results" keys.');
                            return;
                        }

                        // 1. Parse Standings
                        const parsedTeams = json.standings.map(t => ({
                            name: t.Team,
                            p: parseInt(t.Played, 10) || 0,
                            w: parseInt(t.Wins, 10) || 0,
                            d: parseInt(t.Draws, 10) || 0,
                            l: parseInt(t.Losses, 10) || 0,
                            b: parseInt(t.BYEs, 10) || 0,
                            f: parseInt(t.For, 10) || 0,
                            a: parseInt(t.Against, 10) || 0,
                            gd: parseInt(t['Diff.'], 10) || 0,
                            pts: parseInt(t.Points, 10) || 0,
                            baseRank: 0
                        }));

                        parsedTeams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.f - a.f);
                        parsedTeams.forEach((t, i) => t.baseRank = i + 1);
                        setBaseTable(parsedTeams);

                        // --- 2. Calculate Deep History & Metrics ---
                        let maxPlayedRound = 0;
                        let metrics = {
                            biggestWin: { diff: 0, teamA: '', teamB: '', scoreA: 0, scoreB: 0, round: '' },
                            highestScoring: { total: 0, teamA: '', teamB: '', scoreA: 0, scoreB: 0, round: '' },
                            longestStreak: { streak: 0, team: '' }
                        };
                        const teamStreaks = {};
                        parsedTeams.forEach(t => teamStreaks[t.name] = { current: 0, max: 0 });

                        // Find max played round
                        Object.values(json.team_results).forEach(matches => {
                            matches.forEach(m => {
                                if (m.result !== null) {
                                    const rNum = parseInt(m.round.replace(/[^0-9]/g, ''), 10);
                                    if (rNum > maxPlayedRound) maxPlayedRound = rNum;
                                }
                            });
                        });

                        const currentHistoryState = {};
                        parsedTeams.forEach(t => currentHistoryState[t.name] = { p: 0, w: 0, d: 0, l: 0, b: 0, f: 0, a: 0, gd: 0, pts: 0 });
                        const generatedHistory = [];
                        const uniqueMatchesProcessed = new Set(); // Prevent double counting metrics for Home/Away

                        for (let r = 1; r <= maxPlayedRound; r++) {
                            const teamsPlayingThisRound = new Set();
                            
                            Object.entries(json.team_results).forEach(([teamName, matches]) => {
                                const matchThisRound = matches.find(m => parseInt(m.round.replace(/[^0-9]/g, ''), 10) === r);
                                
                                if (matchThisRound && matchThisRound.result !== null) {
                                    teamsPlayingThisRound.add(teamName);
                                    const stats = currentHistoryState[teamName];
                                    stats.p++;
                                    stats.f += matchThisRound.this_team_score;
                                    stats.a += matchThisRound.opposing_team_score;
                                    stats.gd = stats.f - stats.a;

                                    if (matchThisRound.result === 'Win') { 
                                        stats.w++; stats.pts += 3; 
                                        teamStreaks[teamName].current++;
                                        if (teamStreaks[teamName].current > teamStreaks[teamName].max) {
                                            teamStreaks[teamName].max = teamStreaks[teamName].current;
                                        }
                                    } else {
                                        teamStreaks[teamName].current = 0;
                                        if (matchThisRound.result === 'Loss') stats.l++;
                                        if (matchThisRound.result === 'Draw') { stats.d++; stats.pts += 1; }
                                    }

                                    // Metrics Check
                                    const matchKey = `R${r}-${[teamName, matchThisRound.opponent].sort().join('-')}`;
                                    if (!uniqueMatchesProcessed.has(matchKey)) {
                                        uniqueMatchesProcessed.add(matchKey);
                                        const diff = Math.abs(matchThisRound.this_team_score - matchThisRound.opposing_team_score);
                                        const totalGoals = matchThisRound.this_team_score + matchThisRound.opposing_team_score;
                                        
                                        if (diff > metrics.biggestWin.diff) {
                                            metrics.biggestWin = { diff, teamA: teamName, teamB: matchThisRound.opponent, scoreA: matchThisRound.this_team_score, scoreB: matchThisRound.opposing_team_score, round: matchThisRound.round };
                                        }
                                        if (totalGoals > metrics.highestScoring.total) {
                                            metrics.highestScoring = { total: totalGoals, teamA: teamName, teamB: matchThisRound.opponent, scoreA: matchThisRound.this_team_score, scoreB: matchThisRound.opposing_team_score, round: matchThisRound.round };
                                        }
                                    }
                                } else if (!matchThisRound) {
                                     teamStreaks[teamName].current = 0; // Streak breaks on Bye
                                }
                            });

                            parsedTeams.forEach(t => {
                                if (!teamsPlayingThisRound.has(t.name)) currentHistoryState[t.name].b++;
                            });

                            const roundTable = parsedTeams.map(t => ({ name: t.name, ...currentHistoryState[t.name] }));
                            roundTable.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.f - a.f);
                            roundTable.forEach((t, i) => t.rank = i + 1);
                            generatedHistory.push({ round: r, table: roundTable });
                        }

                        // Determine overall longest streak
                        let bestStreakTeam = '';
                        let maxStreak = 0;
                        Object.entries(teamStreaks).forEach(([t, s]) => {
                            if (s.max > maxStreak) { maxStreak = s.max; bestStreakTeam = t; }
                        });
                        metrics.longestStreak = { streak: maxStreak, team: bestStreakTeam };

                        setHistoryData(generatedHistory);
                        setHistoryMetrics(metrics);
                        setScrubberRound(generatedHistory.length > 0 ? generatedHistory[generatedHistory.length - 1].round : 1);


                        // --- 3. Infer current round ---
                        const maxRounds = parsedTeams.reduce((max, team) => Math.max(max, team.p + team.b), 0);
                        const nextRound = maxRounds + 1;
                        setCurrentRound(nextRound);

                        // --- 4. Process Schedule (Predictions) ---
                        let maxScheduleRound = 0;
                        let newPredictions = [];
                        const processedMatches = new Set();
                        
                        // Find max total round limit in JSON
                        Object.values(json.team_results).forEach(matches => {
                            matches.forEach(m => {
                                const rNum = parseInt(m.round.replace(/[^0-9]/g, ''), 10);
                                if (rNum && rNum > maxScheduleRound) maxScheduleRound = rNum;
                            });
                        });
                        
                        if (maxScheduleRound > totalRounds) {
                            setTotalRounds(maxScheduleRound);
                        } else if (maxScheduleRound > 0) {
                            setTotalRounds(Math.max(totalRounds, maxScheduleRound));
                        }

                        // Generate Predictions for unplayed rounds
                        for (let r = nextRound; r <= maxScheduleRound; r++) {
                            const teamsPlayingThisRound = new Set();

                            Object.entries(json.team_results).forEach(([teamName, matches]) => {
                                const matchThisRound = matches.find(m => parseInt(m.round.replace(/[^0-9]/g, ''), 10) === r);
                                
                                if (matchThisRound && matchThisRound.result === null) {
                                    teamsPlayingThisRound.add(teamName);
                                    const opponent = matchThisRound.opponent;
                                    teamsPlayingThisRound.add(opponent);
                                    
                                    // Make match string alphabetical to prevent duplicates regardless of Home/Away parsing 
                                    const teams = [teamName, opponent].sort();
                                    const matchKey = `R${r}-${teams[0]}-${teams[1]}`;
                                    
                                    if (!processedMatches.has(matchKey)) {
                                        processedMatches.add(matchKey);
                                        newPredictions.push({
                                            id: Date.now() + Math.random() + processedMatches.size,
                                            round: r,
                                            teamA: teamName,
                                            teamB: opponent,
                                            scoreA: 0,
                                            scoreB: 0,
                                            isBye: false,
                                            time: matchThisRound.time || ''
                                        });
                                    }
                                }
                            });

                            // Assign BYEs if a team was not scheduled to play
                            parsedTeams.forEach(team => {
                                if (!teamsPlayingThisRound.has(team.name)) {
                                    newPredictions.push({
                                        id: Date.now() + Math.random() + processedMatches.size + 1000,
                                        round: r,
                                        teamA: team.name,
                                        teamB: '',
                                        scoreA: 0,
                                        scoreB: 0,
                                        isBye: true,
                                        time: ''
                                    });
                                }
                            });
                        }

                        setPredictions(newPredictions);
                        setActiveTab('history'); // Jump to history after rich import

                    } catch (err) {
                        console.error(err);
                        alert('Error parsing JSON file. Please ensure it is valid.');
                    }
                };
                reader.readAsText(file);
            };

            // Parse Table from Clipboard text (Manual Mode)
            const handleParse = () => {
                const lines = rawText.trim().split('\n');
                const parsedTeams = [];
                
                lines.forEach(line => {
                    let tokens = line.trim().split(/\s+/);
                    if (tokens.length < 8) return;

                    // Extract all numbers from the end
                    const stats = [];
                    while(tokens.length > 0) {
                       const last = tokens[tokens.length - 1];
                       if (/^-?\d+$/.test(last) || last === '-' || last.startsWith('+')) {
                           stats.unshift(tokens.pop().replace('+', ''));
                       } else {
                           break;
                       }
                    }
                    
                    // If we grabbed too many (e.g. team name has numbers), push them back to team name
                    while (stats.length > 9) {
                        tokens.push(stats.shift());
                    }
                    
                    if (stats.length < 8) return;

                    let p, w, d, l, b, f, a, gd, pts;
                    if (stats.length === 9) {
                        [p, w, d, l, b, f, a, gd, pts] = stats.map(val => val === '-' ? 0 : parseInt(val, 10));
                    } else if (stats.length === 8) {
                        [p, w, d, l, f, a, gd, pts] = stats.map(val => val === '-' ? 0 : parseInt(val, 10));
                        b = 0;
                    }

                    // Remove initial rank number if exists
                    if (!isNaN(parseInt(tokens[0])) && tokens.length > 1) {
                        tokens.shift();
                    }
                    
                    const name = tokens.join(' ').replace(/[^a-zA-Z0-9\s-]/g, '').trim();
                    if(name) {
                        parsedTeams.push({ name, p, w, d, l, b, f, a, gd, pts, baseRank: 0 });
                    }
                });

                // Assign Base Rank
                parsedTeams.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.f - a.f);
                parsedTeams.forEach((t, i) => t.baseRank = i + 1);

                setBaseTable(parsedTeams);
                
                // --- PARSE SCHEDULE ---
                let newPredictions = [];
                let maxScheduleRound = 0;
                let minScheduleRound = Infinity;
                
                if (parsedTeams.length > 0 && rawSchedule.trim()) {
                    const scheduleLines = rawSchedule.trim().split('\n');
                    // Sort teams by length descending to match longest possible names first
                    const knownTeams = parsedTeams.map(t => t.name).sort((a,b) => b.length - a.length);
                    let currentParseRound = null;

                    scheduleLines.forEach(line => {
                        const roundMatch = line.match(/Round\s+(\d+)/i);
                        if (roundMatch) {
                            currentParseRound = parseInt(roundMatch[1], 10);
                            maxScheduleRound = Math.max(maxScheduleRound, currentParseRound);
                            minScheduleRound = Math.min(minScheduleRound, currentParseRound);
                            return;
                        }

                        if (!currentParseRound) return;

                        if (line.includes('have a BYE') || line.includes('have a bye')) {
                            const normalizedLine = line.replace(/[^a-zA-Z0-9\s-]/g, '');
                            const byeTeam = knownTeams.find(t => normalizedLine.includes(t.replace(/[^a-zA-Z0-9\s-]/g, '')));
                            if (byeTeam) {
                                newPredictions.push({
                                    id: Date.now() + Math.random(),
                                    round: currentParseRound,
                                    teamA: byeTeam,
                                    teamB: '',
                                    scoreA: 0,
                                    scoreB: 0,
                                    isBye: true,
                                    time: ''
                                });
                            }
                            return;
                        }

                        const timeMatch = line.match(/\d{1,2}:\d{2}[AP]M/i);
                        if (timeMatch) {
                            const time = timeMatch[0];
                            let remainingLine = line.replace(time, '').replace(/[^a-zA-Z0-9\s-]/g, '');
                            let foundTeams = [];

                            for (const team of knownTeams) {
                                const normalizedTeam = team.replace(/[^a-zA-Z0-9\s-]/g, '');
                                if (remainingLine.includes(normalizedTeam)) {
                                    foundTeams.push({ name: team, index: remainingLine.indexOf(normalizedTeam) });
                                    remainingLine = remainingLine.split(normalizedTeam).join('###'); 
                                }
                            }
                            
                            foundTeams.sort((a, b) => a.index - b.index);

                            if (foundTeams.length >= 2) {
                                newPredictions.push({
                                    id: Date.now() + Math.random(),
                                    round: currentParseRound,
                                    teamA: foundTeams[0].name,
                                    teamB: foundTeams[1].name,
                                    scoreA: 0,
                                    scoreB: 0,
                                    isBye: false,
                                    time: time
                                });
                            }
                        }
                    });
                }

                if(parsedTeams.length > 0) {
                    const maxRounds = parsedTeams.reduce((max, team) => Math.max(max, team.p + team.b), 0);
                    const nextRound = maxRounds + 1;
                    
                    newPredictions = newPredictions.filter(p => p.round >= nextRound);
                    setCurrentRound(nextRound);
                    
                    const validScheduleRounds = newPredictions.map(p => p.round);
                    if (validScheduleRounds.length > 0) {
                        const finalMaxScheduleRound = Math.max(...validScheduleRounds);
                        if (finalMaxScheduleRound > totalRounds) {
                            setTotalRounds(finalMaxScheduleRound);
                        }
                    }
                    
                    setHistoryData([]); 
                    setActiveTab('predict');
                }
                
                setPredictions(newPredictions);
            };

            // Calculate Predicted Table dynamically
            const predictedTable = useMemo(() => {
                if (baseTable.length === 0) return [];
                
                const table = JSON.parse(JSON.stringify(baseTable));
                const teamMap = {};
                table.forEach(t => teamMap[t.name] = t);

                predictions.forEach(match => {
                    if (match.isBye) {
                        if (teamMap[match.teamA]) teamMap[match.teamA].b++;
                        return;
                    }

                    const tA = teamMap[match.teamA];
                    const tB = teamMap[match.teamB];

                    if (tA && tB && match.teamA !== match.teamB) {
                        tA.p++; tB.p++;
                        tA.f += match.scoreA; tA.a += match.scoreB;
                        tB.f += match.scoreB; tB.a += match.scoreA;
                        tA.gd = tA.f - tA.a; tB.gd = tB.f - tB.a;

                        if (match.scoreA > match.scoreB) {
                            tA.w++; tB.l++; tA.pts += 3;
                        } else if (match.scoreA < match.scoreB) {
                            tB.w++; tA.l++; tB.pts += 3;
                        } else {
                            tA.d++; tB.d++; tA.pts += 1; tB.pts += 1;
                        }
                    }
                });

                table.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.f - a.f);
                table.forEach((t, i) => t.predictedRank = i + 1);
                
                return table;
            }, [baseTable, predictions]);

            // Get available teams for a specific match dropdown
            const getAvailableTeams = (roundNum, matchId, currentTeam) => {
                const usedTeams = new Set();
                predictions.forEach(p => {
                    if (p.round === roundNum && p.id !== matchId) {
                        if (p.teamA) usedTeams.add(p.teamA);
                        if (!p.isBye && p.teamB) usedTeams.add(p.teamB);
                    }
                });
                return baseTable.map(t => t.name).filter(name => !usedTeams.has(name) || name === currentTeam);
            };

            // Fixture Management
            const addMatch = (roundNum) => {
                const usedTeams = new Set();
                predictions.filter(p => p.round === roundNum).forEach(p => {
                    if (p.teamA) usedTeams.add(p.teamA);
                    if (!p.isBye && p.teamB) usedTeams.add(p.teamB);
                });
                const availableTeams = baseTable.map(t=>t.name).filter(t => !usedTeams.has(t));

                setPredictions([...predictions, {
                    id: Date.now() + Math.random(),
                    round: roundNum,
                    teamA: availableTeams[0] || '',
                    teamB: availableTeams[1] || '',
                    scoreA: 0,
                    scoreB: 0,
                    isBye: false,
                    time: ''
                }]);
            };

            const addBye = (roundNum) => {
                const usedTeams = new Set();
                predictions.filter(p => p.round === roundNum).forEach(p => {
                    if (p.teamA) usedTeams.add(p.teamA);
                    if (!p.isBye && p.teamB) usedTeams.add(p.teamB);
                });
                const availableTeams = baseTable.map(t=>t.name).filter(t => !usedTeams.has(t));

                setPredictions([...predictions, {
                    id: Date.now() + Math.random(),
                    round: roundNum,
                    teamA: availableTeams[0] || '',
                    teamB: '',
                    scoreA: 0,
                    scoreB: 0,
                    isBye: true,
                    time: ''
                }]);
            };

            const updateMatch = (id, field, value) => {
                setPredictions(predictions.map(p => p.id === id ? { ...p, [field]: value } : p));
            };

            const removeMatch = (id) => {
                setPredictions(predictions.filter(p => p.id !== id));
            };

            const getMovementIcon = (base, predicted) => {
                if (predicted < base) return <IconUp />;
                if (predicted > base) return <IconDown />;
                return <IconDash />;
            };

            const activePredictionRounds = [...new Set(predictions.map(p => p.round))];
            const maxVisibleRound = Math.max(totalRounds, ...activePredictionRounds);

            // History Chart Parameters
            const getChartCoordinates = () => {
                if (!historyData.length || !baseTable.length) return { paths: [], points: [] };
                
                const width = 1000;
                const height = 400;
                const padX = 40;
                const padY = 30;
                
                const numRounds = historyData.length;
                const numTeams = baseTable.length;
                
                const getX = (roundIdx) => padX + (roundIdx * (width - 2 * padX) / Math.max(1, numRounds - 1));
                const getY = (rank) => padY + ((rank - 1) * (height - 2 * padY) / Math.max(1, numTeams - 1));

                const teamPaths = {};
                const teamPoints = {};

                baseTable.forEach((team, i) => {
                    teamPaths[team.name] = [];
                    teamPoints[team.name] = [];
                });

                historyData.forEach((h, roundIdx) => {
                    const x = getX(roundIdx);
                    h.table.forEach(teamStats => {
                        const y = getY(teamStats.rank);
                        teamPaths[teamStats.name].push(`${roundIdx === 0 ? 'M' : 'L'} ${x} ${y}`);
                        teamPoints[teamStats.name].push({ x, y, rank: teamStats.rank, round: h.round });
                    });
                });

                return { 
                    paths: Object.entries(teamPaths).map(([name, pathData]) => ({ name, d: pathData.join(' ') })),
                    points: teamPoints,
                    width, height, padX, padY, numRounds
                };
            };

            const chartData = useMemo(() => getChartCoordinates(), [historyData, baseTable]);

            return (
                <div className="min-h-screen bg-gray-50 pb-20">

                                    <IconTrophy />
                                </div>

                                    className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${activeTab === 'import' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-800'}`}
                                >
                                    Data Setup
                                </button>
                                {historyData.length > 0 && (
                                    <button 
                                        onClick={() => setActiveTab('history')}
                                        className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 ${activeTab === 'history' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-800'}`}
                                    >
                                        <IconChart /> Progress

                                <button

                                    className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${baseTable.length === 0 ? 'opacity-50 cursor-not-allowed text-gray-400' : activeTab === 'predict' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-800'}`}
                                >
                                    Predictions
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="w-[96%] max-w-[1800px] mx-auto px-4 mt-6">

                                        <div>
                                            <p className="text-xl font-extrabold text-gray-900">{historyMetrics.biggestWin.scoreA > historyMetrics.biggestWin.scoreB ? historyMetrics.biggestWin.teamA : historyMetrics.biggestWin.teamB}</p>
                                            <p className="text-yellow-600 font-semibold">Won by {historyMetrics.biggestWin.diff} Goals ({historyMetrics.biggestWin.scoreA} - {historyMetrics.biggestWin.scoreB})</p>
                                            <p className="text-xs text-gray-400 mt-1">vs {historyMetrics.biggestWin.scoreA > historyMetrics.biggestWin.scoreB ? historyMetrics.biggestWin.teamB : historyMetrics.biggestWin.teamA} in {historyMetrics.biggestWin.round}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Graph Section */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-lg font-bold text-gray-900">Season Rank Trajectory</h2>
                                        <div className="flex flex-wrap gap-2 justify-end max-w-2xl">
                                            {baseTable.map((t, i) => (
                                                <div 
                                                    key={t.name} 
                                                    onMouseEnter={() => setHighlightedTeam(t.name)}
                                                    onMouseLeave={() => setHighlightedTeam(null)}
                                                    className={`text-[10px] font-bold px-2 py-1 rounded cursor-pointer transition-all ${highlightedTeam === t.name || !highlightedTeam ? 'opacity-100 scale-105' : 'opacity-30'}`}
                                                    style={{ backgroundColor: `${TEAM_COLORS[i % TEAM_COLORS.length]}20`, color: TEAM_COLORS[i % TEAM_COLORS.length] }}
                                                >
                                                    {t.name}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    <div className="w-full overflow-x-auto hide-scrollbar border border-gray-100 rounded-xl bg-gray-50/30">
                                        <svg viewBox={`0 0 ${chartData.width} ${chartData.height}`} className="w-full h-auto min-w-[800px] bg-transparent">
                                            {/* Y-Axis (Ranks) */}
                                            {Array.from({ length: baseTable.length }).map((_, i) => {
                                                const y = chartData.padY + (i * (chartData.height - 2 * chartData.padY) / Math.max(1, baseTable.length - 1));
                                                return (
                                                    <g key={`y-${i}`}>
                                                        <line x1={chartData.padX} y1={y} x2={chartData.width - chartData.padX} y2={y} stroke="#e5e7eb" strokeWidth="1" strokeDasharray="4 4" />
                                                        <text x={chartData.padX - 10} y={y + 4} textAnchor="end" className="text-[10px] fill-gray-400 font-mono font-bold">{i + 1}</text>
                                                    </g>
                                                );
                                            })}
                                            
                                            {/* X-Axis (Rounds) */}
                                            {historyData.map((h, i) => {
                                                const x = chartData.padX + (i * (chartData.width - 2 * chartData.padX) / Math.max(1, chartData.numRounds - 1));
                                                return (
                                                    <text key={`x-${i}`} x={x} y={chartData.height - 5} textAnchor="middle" className="text-[10px] fill-gray-400 font-bold uppercase tracking-wider">R{h.round}</text>
                                                );
                                            })}

                                            {/* Paths */}
                                            {chartData.paths.map((path, i) => {
                                                const isHighlighted = highlightedTeam === path.name;
                                                const isFaded = highlightedTeam && !isHighlighted;
                                                return (
                                                    <path 
                                                        key={path.name} 
                                                        d={path.d} 
                                                        fill="none" 
                                                        stroke={TEAM_COLORS[i % TEAM_COLORS.length]} 
                                                        strokeWidth={isHighlighted ? "4" : "2"} 
                                                        className={`transition-all duration-300 ${isFaded ? 'opacity-10' : isHighlighted ? 'opacity-100 drop-shadow-md' : 'opacity-70'}`}
                                                    />
                                                );
                                            })}
                                            
                                            {/* Points */}
                                            {Object.entries(chartData.points).map(([teamName, points], teamIdx) => {
                                                const isHighlighted = highlightedTeam === teamName;
                                                const isFaded = highlightedTeam && !isHighlighted;
                                                return points.map((p, i) => (
                                                    <circle 
                                                        key={`${teamName}-${i}`} 
                                                        cx={p.x} cy={p.y} r={isHighlighted ? "4" : "0"} 
                                                        fill={TEAM_COLORS[teamIdx % TEAM_COLORS.length]} 
                                                        className={`transition-all duration-300 ${isFaded ? 'opacity-0' : 'opacity-100'}`}
                                                    />
                                                ));
                                            })}
                                        </svg>
                                    </div>
                                </div>

                                {/* Dynamic Scrubber Table */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-8">
                                    <div className="flex justify-between items-end mb-6">
                                        <div>
                                            <h2 className="text-lg font-bold text-gray-900">Time Machine Table</h2>
                                            <p className="text-sm text-gray-500">Drag the slider to view past standings.</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-3xl font-extrabold text-blue-600 block">Round {scrubberRound}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="mb-6 bg-gray-50 p-4 rounded-xl border border-gray-200">
                                        <input 
                                            type="range" 
                                            min={historyData[0]?.round || 1} 
                                            max={historyData[historyData.length - 1]?.round || 1} 
                                            value={scrubberRound} 
                                            onChange={(e) => setScrubberRound(parseInt(e.target.value, 10))}
                                            className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                        />
                                        <div className="flex justify-between text-xs font-bold text-gray-400 mt-2 px-1">
                                            <span>R{historyData[0]?.round || 1}</span>
                                            <span>R{historyData[historyData.length - 1]?.round || 1}</span>
                                        </div>
                                    </div>

                                    <div className="overflow-x-auto rounded-xl border border-gray-200">
                                        <table className="w-full text-sm text-left">
                                            <thead className="text-xs text-gray-500 uppercase bg-gray-100 border-b border-gray-200">
                                                <tr>
                                                    <th className="px-3 py-3 text-center w-8">#</th>
                                                    <th className="px-4 py-3 font-bold text-gray-700">Team</th>
                                                    <th className="px-2 py-3 text-center" title="Played">P</th>
                                                    <th className="px-2 py-3 text-center text-green-600" title="Wins">W</th>
                                                    <th className="px-2 py-3 text-center text-gray-400" title="Draws">D</th>
                                                    <th className="px-2 py-3 text-center text-red-500" title="Losses">L</th>
                                                    <th className="px-2 py-3 text-center" title="Byes">B</th>
                                                    <th className="px-2 py-3 text-center text-gray-400" title="Goals For">F</th>
                                                    <th className="px-2 py-3 text-center text-gray-400" title="Goals Against">A</th>
                                                    <th className="px-2 py-3 text-center font-semibold" title="Goal Difference">GD</th>
                                                    <th className="px-3 py-3 text-center font-bold text-blue-600 text-base">Pts</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {historyData.find(h => h.round === scrubberRound)?.table.map((team, idx) => (
                                                    <tr key={team.name} className={`hover:bg-blue-50/50 transition-colors ${idx < 4 ? 'bg-green-50/10' : ''}`}>
                                                        <td className="px-3 py-2 text-center font-bold text-gray-500">{team.rank}</td>
                                                        <td className="px-4 py-2 font-bold text-gray-900 whitespace-nowrap">
                                                            <div className="flex items-center gap-2">
                                                                <span className="w-2 h-2 rounded-full" style={{ backgroundColor: TEAM_COLORS[baseTable.findIndex(t => t.name === team.name) % TEAM_COLORS.length] }}></span>
                                                                {team.name}
                                                            </div>
                                                        </td>
                                                        <td className="px-2 py-2 text-center font-medium text-gray-600">{team.p}</td>
                                                        <td className="px-2 py-2 text-center font-medium text-green-600">{team.w}</td>
                                                        <td className="px-2 py-2 text-center font-medium text-gray-400">{team.d}</td>
                                                        <td className="px-2 py-2 text-center font-medium text-red-500">{team.l}</td>
                                                        <td className="px-2 py-2 text-center font-medium text-gray-500">{team.b}</td>
                                                        <td className="px-2 py-2 text-center text-gray-400">{team.f}</td>
                                                        <td className="px-2 py-2 text-center text-gray-400">{team.a}</td>
                                                        <td className="px-2 py-2 text-center font-semibold text-gray-700">{team.gd > 0 ? `+${team.gd}` : team.gd}</td>
                                                        <td className="px-3 py-2 text-center font-extrabold text-blue-600 text-base">{team.pts}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'predict' && (
                            <div className="flex flex-col gap-6 items-center w-full">
                                
                                {/* TOP ROW: Live Table (Sticky, restricted width) */}
                                <div className="w-full max-w-6xl sticky top-[4.5rem] z-20">
                                    <div className="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
                                        <div className="bg-gray-900 px-5 py-4 flex justify-between items-center">
                                            <h2 className="text-lg font-bold text-white flex items-center gap-2">
                                                Predicted League Table
                                            </h2>
                                            <div className="flex items-center gap-2 text-xs font-medium text-gray-300 bg-gray-800 px-3 py-1 rounded-full">
                                                <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Live
                                            </div>
                                        </div>
                                        
                                        <div className="overflow-y-auto max-h-[50vh] hide-scrollbar bg-white">
                                            <table className="w-full text-sm text-left relative">
                                                <thead className="text-xs text-gray-500 uppercase bg-gray-50 border-b border-gray-200 sticky top-0 z-10 shadow-sm bg-gray-50">
                                                    <tr>
                                                        <th className="px-3 py-3 text-center w-10">Mvmt</th>
                                                        <th className="px-2 py-3 text-center w-8">#</th>
                                                        <th className="px-4 py-3 font-bold text-gray-700">Team</th>
                                                        <th className="px-2 py-3 text-center" title="Played">P</th>
                                                        <th className="px-2 py-3 text-center text-green-600" title="Wins">W</th>
                                                        <th className="px-2 py-3 text-center text-gray-400" title="Draws">D</th>
                                                        <th className="px-2 py-3 text-center text-red-500" title="Losses">L</th>
                                                        <th className="px-2 py-3 text-center" title="Byes">B</th>
                                                        <th className="px-2 py-3 text-center text-gray-400" title="Goals For">F</th>
                                                        <th className="px-2 py-3 text-center text-gray-400" title="Goals Against">A</th>
                                                        <th className="px-2 py-3 text-center font-semibold" title="Goal Difference">GD</th>
                                                        <th className="px-3 py-3 text-center font-bold text-blue-600 text-base">Pts</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-gray-100">
                                                    {predictedTable.map((team, idx) => (
                                                        <tr key={team.name} className={`hover:bg-blue-50/50 transition-colors ${idx < 4 ? 'bg-green-50/20' : ''}`}>
                                                            <td className="px-3 py-2 text-center align-middle">
                                                                <div className="flex justify-center items-center">
                                                                    {getMovementIcon(team.baseRank, team.predictedRank)}
                                                                </div>
                                                            </td>
                                                            <td className="px-2 py-2 text-center font-bold text-gray-500">{team.predictedRank}</td>
                                                            <td className="px-4 py-2 font-bold text-gray-900 whitespace-nowrap">{team.name}</td>
                                                            <td className="px-2 py-2 text-center font-medium text-gray-600">{team.p}</td>
                                                            <td className="px-2 py-2 text-center font-medium text-green-600">{team.w}</td>
                                                            <td className="px-2 py-2 text-center font-medium text-gray-400">{team.d}</td>
                                                            <td className="px-2 py-2 text-center font-medium text-red-500">{team.l}</td>
                                                            <td className="px-2 py-2 text-center font-medium text-gray-500">{team.b}</td>
                                                            <td className="px-2 py-2 text-center text-gray-400">{team.f}</td>
                                                            <td className="px-2 py-2 text-center text-gray-400">{team.a}</td>
                                                            <td className="px-2 py-2 text-center font-semibold text-gray-700">{team.gd > 0 ? `+${team.gd}` : team.gd}</td>
                                                            <td className="px-3 py-2 text-center font-extrabold text-blue-600 text-base">{team.pts}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>

                                {/* BOTTOM ROW: Predictions Builder (Full width, horizontal scrolling) */}
                                <div className="w-full bg-white p-5 rounded-2xl shadow-sm border border-gray-200">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-bold text-gray-900">Match Predictor</h2>
                                    </div>

                                    {/* Horizontal Scrolling Container */}
                                    <div className="flex overflow-x-auto gap-6 items-start pb-6 snap-x hide-scrollbar">
                                        {Array.from({ length: maxVisibleRound - currentRound + 1 }, (_, i) => currentRound + i).map(roundNum => {
                                            const roundMatches = predictions
                                                .filter(p => p.round === roundNum)
                                                .sort((a, b) => {
                                                    if (!a.time && !b.time) return 0;
                                                    if (!a.time) return 1;
                                                    if (!b.time) return -1;
                                                    const parseTime = (t) => {
                                                        const match = t.match(/(\d+):(\d+)([AP]M)/i);
                                                        if(!match) return 0;
                                                        let [_, h, m, ampm] = match;
                                                        h = parseInt(h);
                                                        if(ampm.toUpperCase() === 'PM' && h < 12) h += 12;
                                                        if(ampm.toUpperCase() === 'AM' && h === 12) h = 0;
                                                        return h * 60 + parseInt(m);
                                                    };
                                                    return parseTime(a.time) - parseTime(b.time);
                                                });
                                            
                                            return (
                                                <div key={roundNum} className="w-[450px] flex-none bg-gray-50/50 p-4 rounded-xl border border-gray-100 snap-start">
                                                    <div className="flex items-center justify-between mb-3 border-b border-gray-200 pb-2">
                                                        <h3 className="font-bold text-gray-700 bg-white px-3 py-1 rounded-md text-sm border border-gray-200 shadow-sm">Round {roundNum}</h3>
                                                        <div className="flex gap-2">
                                                            <button 
                                                                onClick={() => addBye(roundNum)}
                                                                className="text-xs font-bold text-gray-600 hover:text-gray-800 bg-gray-200 px-2 py-1 rounded transition-colors"
                                                            >
                                                                + Bye
                                                            </button>
                                                            <button 
                                                                onClick={() => addMatch(roundNum)}
                                                                className="text-xs font-bold text-blue-600 hover:text-blue-800 bg-blue-50 px-2 py-1 rounded transition-colors"
                                                            >
                                                                + Match
                                                            </button>
                                                        </div>
                                                    </div>

                                                    {roundMatches.length === 0 && (
                                                        <p className="text-xs text-gray-400 italic text-center py-4 bg-white rounded-lg border border-dashed border-gray-200">No fixtures added.</p>
                                                    )}

                                                    <div className="space-y-4">
                                                        {roundMatches.map((match, idx) => (
                                                            <div key={match.id} className={`p-3 rounded-xl border mt-2 ${match.isBye ? 'bg-gray-50 border-gray-200 border-dashed' : 'bg-white border-gray-200 shadow-sm'} relative group`}>
                                                                
                                                                {match.time && (
                                                                    <div className="absolute -top-2.5 left-1/2 transform -translate-x-1/2">
                                                                        <span className="bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-0.5 rounded-md border border-blue-200 whitespace-nowrap shadow-sm">
                                                                            {match.time}
                                                                        </span>
                                                                    </div>
                                                                )}

                                                                {/* Match Card Actions */}
                                                                <div className="absolute top-2 right-2 flex items-center space-x-2">
                                                                    <button onClick={() => removeMatch(match.id)} className="p-1 text-gray-300 hover:text-red-500 transition-colors">
                                                                        <IconTrash />
                                                                    </button>
                                                                </div>

                                                                {match.isBye ? (
                                                                    <div className="pt-4 pb-2">
                                                                         <select 
                                                                            value={match.teamA} 
                                                                            onChange={(e) => updateMatch(match.id, 'teamA', e.target.value)}
                                                                            className="w-full text-sm font-semibold text-gray-700 bg-gray-100 border-transparent rounded-lg p-2 focus:ring-0 focus:border-transparent outline-none truncate"
                                                                        >
                                                                            {getAvailableTeams(roundNum, match.id, match.teamA).map(t => <option key={t} value={t}>{t}</option>)}
                                                                        </select>
                                                                        <p className="text-center text-xs font-bold text-gray-400 mt-2 uppercase tracking-widest">Has a BYE</p>
                                                                    </div>
                                                                ) : (
                                                                    <div className="pt-3 flex flex-col space-y-3">
                                                                        {/* Home Team Row */}
                                                                        <div className="flex items-center justify-between gap-2">
                                                                            <select 
                                                                                value={match.teamA} 
                                                                                onChange={(e) => updateMatch(match.id, 'teamA', e.target.value)}
                                                                                className={`flex-1 min-w-0 text-sm font-bold border rounded-lg py-2 px-3 outline-none transition-colors truncate ${match.scoreA > match.scoreB ? 'bg-green-50 hover:bg-green-100 text-green-900 border-green-200' : match.scoreA < match.scoreB ? 'bg-red-50 hover:bg-red-100 text-red-900 border-red-100' : 'bg-gray-100 hover:bg-gray-200 text-gray-800 border-transparent'}`}
                                                                            >
                                                                                {getAvailableTeams(roundNum, match.id, match.teamA).map(t => <option key={t} value={t}>{t}</option>)}
                                                                            </select>
                                                                            <Counter value={match.scoreA} onChange={(val) => updateMatch(match.id, 'scoreA', val)} />
                                                                        </div>

                                                                        {/* VS Divider */}
                                                                        <div className="flex justify-center items-center h-1 relative">
                                                                            <div className="absolute w-full border-t border-dashed border-gray-200"></div>
                                                                            <span className="bg-white px-2 text-[10px] font-bold text-gray-400 z-10 uppercase tracking-widest">VS</span>
                                                                        </div>

                                                                        {/* Away Team Row */}
                                                                        <div className="flex items-center justify-between gap-2">
                                                                            <select 
                                                                                value={match.teamB} 
                                                                                onChange={(e) => updateMatch(match.id, 'teamB', e.target.value)}
                                                                                className={`flex-1 min-w-0 text-sm font-bold border rounded-lg py-2 px-3 outline-none transition-colors truncate text-right ${match.scoreB > match.scoreA ? 'bg-green-50 hover:bg-green-100 text-green-900 border-green-200' : match.scoreB < match.scoreA ? 'bg-red-50 hover:bg-red-100 text-red-900 border-red-100' : 'bg-gray-100 hover:bg-gray-200 text-gray-800 border-transparent'}`}
                                                                            >
                                                                                {getAvailableTeams(roundNum, match.id, match.teamB).map(t => <option key={t} value={t}>{t}</option>)}
                                                                            </select>
                                                                            <Counter value={match.scoreB} onChange={(val) => updateMatch(match.id, 'scoreB', val)} />
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )
                                        })}

                                        {/* Add Round Card Button */}
                                        <button 
                                            onClick={() => setTotalRounds(r => r + 1)}
                                            className="w-[200px] flex-none border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-bold hover:bg-gray-50 hover:text-gray-700 transition-colors flex flex-col items-center justify-center min-h-[150px] snap-start mt-[3.5rem]"
                                        >
                                            <span className="text-2xl mb-1">+</span>
                                            Add Round {maxVisibleRound + 1}
                                        </button>

                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
